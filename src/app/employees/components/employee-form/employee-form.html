<div class="offcanvas offcanvas-end" 
     [class.show]="visible" 
     tabindex="-1">
  <div class="offcanvas-header">
    <h5>{{ mode === 'create' ? 'Agregar Empleado' : 'Actualizar Empleado' }}</h5>
    <button type="button" class="btn-close" (click)="onClose()"></button>
  </div>
  
  <div class="offcanvas-body">
    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input 
          type="text" 
          class="form-control" 
          [(ngModel)]="employee.nombre"
          name="nombre"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Apellido Paterno</label>
        <input 
          type="text" 
          class="form-control" 
          [(ngModel)]="employee.apellido_paterno"
          name="apellido_paterno"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Apellido Materno</label>
        <input 
          type="text" 
          class="form-control" 
          [(ngModel)]="employee.apellido_materno"
          name="apellido_materno">
      </div>

      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input 
          type="tel" 
          class="form-control" 
          [(ngModel)]="employee.telefono"
          name="telefono"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">CURP</label>
        <input 
          type="text" 
          class="form-control" 
          [(ngModel)]="employee.curp"
          name="curp"
          required>
      </div>

      <button type="submit" class="btn btn-primary">
        {{ mode === 'create' ? 'Agregar' : 'Actualizar' }}
      </button>
    </form>
  </div>
</div>

<!-- Backdrop del offcanvas -->
<div class="offcanvas-backdrop fade" 
     [class.show]="visible" 
     (click)="onClose()"
     *ngIf="visible"></div>

<!-- Modal de error -->
<div *ngIf="showErrorModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-white shadow-lg rounded">
      <div class="modal-header border-0 justify-content-center">
        <h5 class="modal-title text-danger fw-bold d-flex align-items-center">
          <i class="bi bi-x-circle-fill fs-1 me-2"></i> <!-- Ícono de X roja grande -->
          Error
        </h5>
      </div>
      <div class="modal-body text-center text-dark">
        El formulario está vacío o incompleto.<br>
        Por favor llena todos los campos obligatorios.
      </div>
      <div class="modal-footer border-0 justify-content-center">
        <button type="button" class="btn btn-outline-danger" (click)="showErrorModal=false">
          Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
