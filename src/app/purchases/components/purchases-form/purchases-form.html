<div class="offcanvas offcanvas-end" [class.show]="visible" tabindex="-1">
  <div class="offcanvas-header">
    <h5>{{ mode === 'create' ? 'Agregar Compra' : 'Actualizar Compra' }}</h5>
    <button type="button" class="btn-close" (click)="onClose()">✕</button>
  </div>

  <!-- Wizard steps indicator -->
  <div class="steps-indicator">
    <div class="step" [class.active]="isStep1" [class.done]="isStep2">
      <span class="step-num">1</span>
      <span class="step-label">Info General</span>
    </div>
    <div class="step-line"></div>
    <div class="step" [class.active]="isStep2">
      <span class="step-num">2</span>
      <span class="step-label">{{ isPedido ? 'Datos Pedido' : 'Datos Directa' }}</span>
    </div>
  </div>

  <div class="offcanvas-body">
    <!-- PASO 1: Info general -->
    <form *ngIf="isStep1" (ngSubmit)="nextStep()">
      <div class="mb-3">
        <label class="form-label">Tipo de Compra</label>
        <select class="form-control" [(ngModel)]="compra.tipoCompra" name="tipoCompra" required>
          <option value="pedido">Pedido</option>
          <option value="directa">Directa</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Fecha de Compra</label>
        <input
          type="datetime-local"
          class="form-control"
          [(ngModel)]="compra.fechaCompra"
          name="fechaCompra"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Forma de Pago</label>
        <select class="form-control" [(ngModel)]="compra.formaPago" name="formaPago" required>
          <option value="efectivo">Efectivo</option>
          <option value="transferencia">Transferencia</option>
          <option value="cheque">Cheque</option>
          <option value="credito">Crédito</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Estado</label>
        <select class="form-control" [(ngModel)]="compra.estado" name="estado" required>
          <option value="pendiente">Pendiente</option>
          <option value="completada">Completada</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Total</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="compra.total"
          name="total"
          min="0"
          step="0.01"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">ID Empleado</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="compra.idEmpleado"
          name="idEmpleado"
          required
        />
      </div>

      <button type="submit" class="btn-primary">Siguiente →</button>
    </form>

    <!-- PASO 2: Datos según tipo -->
    <form *ngIf="isStep2" (ngSubmit)="onSubmit()">
      <!-- Compra por Pedido -->
      <ng-container *ngIf="isPedido">
        <div class="mb-3">
          <label class="form-label">Folio</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="compra.folio"
            name="folio"
            placeholder="Ej. F-2024-001"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Factura Proveedor</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="compra.facturaProveedor"
            name="facturaProveedor"
            placeholder="Número de factura"
          />
        </div>
      </ng-container>

      <!-- Compra Directa -->
      <ng-container *ngIf="!isPedido">
        <div class="mb-3">
          <label class="form-label">Referencia de Pago</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="compra.referenciaPago"
            name="referenciaPago"
            placeholder="REF-XXX"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Documento de Referencia</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="compra.documentoReferencia"
            name="documentoReferencia"
            placeholder="Número de documento"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Origen</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="compra.origen"
            name="origen"
            placeholder="Ej. Proveedor local"
          />
        </div>
      </ng-container>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="prevStep()">← Anterior</button>
        <button type="submit" class="btn-primary">
          {{ mode === 'create' ? 'Guardar Compra' : 'Actualizar' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div
  class="offcanvas-backdrop fade"
  [class.show]="visible"
  (click)="onClose()"
  *ngIf="visible"
></div>
