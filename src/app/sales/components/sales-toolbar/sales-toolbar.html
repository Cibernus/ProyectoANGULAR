<div class="primer-apartado">
  <div class="busqueda">
    <i class='bx bx-search icono-busqueda'></i>
    <input 
      type="search" 
      id="busqueda" 
      placeholder="Buscar..." 
      aria-label="Buscar Ventas"
      (input)="onSearch($event)">
  </div>
  
  <div>
    <button class="nuevo-producto" (click)="onNuevaVenta()">
      <i class='bx bx-plus'></i>Nueva venta
    </button>
  </div>
</div>
