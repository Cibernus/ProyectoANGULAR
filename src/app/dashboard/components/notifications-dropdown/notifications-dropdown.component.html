<div class="dropdown">
  <!-- BOTÓN CAMPANA -->
  <button class="bell-btn" type="button" (click)="toggle()" [class.open]="isOpen">
    <i class="bx bx-bell"></i>
    <span class="bell-badge" *ngIf="unreadCount > 0"></span>
  </button>

  <!-- DROPDOWN -->
  <div class="notif-dropdown" [class.show]="isOpen">
    <!-- CABECERA -->
    <div class="notif-header">
      <span class="notif-header-title">
        Notificaciones
        <span class="notif-count" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </span>
      <span class="notif-mark-all" (click)="marcarTodasLeidas()"> Marcar todas como leídas </span>
    </div>

    <!-- LISTA CON SCROLL -->
    <div class="notif-list">
      <!-- Sin notificaciones -->
      <div class="notif-empty" *ngIf="notifications.length === 0">
        <i class="bx bx-bell-off"></i>
        <span>Sin notificaciones</span>
      </div>

      <!-- Ítems -->
      <div
        class="notif-item"
        *ngFor="let n of notifications"
        [class.unread]="!n.leida"
        (click)="marcarLeida(n.id)"
      >
        <div class="notif-icon" [ngClass]="'ni-' + n.tipo">
          <i [class]="getIcono(n.tipo)"></i>
        </div>
        <div class="notif-body">
          <div class="notif-titulo">{{ n.titulo }}</div>
          <div class="notif-desc">{{ n.descripcion }}</div>
          <div class="notif-tiempo">{{ n.tiempo }}</div>
        </div>
        <div class="unread-dot" *ngIf="!n.leida"></div>
      </div>
    </div>

    <!-- PIE -->
    <div class="notif-footer">Ver todas las notificaciones</div>
  </div>
</div>
