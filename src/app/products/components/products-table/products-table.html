<div class="tablas-informacion">
  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Cantidad</th>
        <th>Imagen</th>
        <th>Operaciones</th>
      </tr>
    </thead>

    <tbody>
     <tr *ngFor="let producto of products">


        <td>{{ producto.nombre }}</td>
        <td>{{ producto.descripcion }}</td>
        <td>{{ producto.precio | currency:'MXN' }}</td>
        <td>{{ producto.cantidad }}</td>

        <td>
          <img *ngIf="producto.imagenUrl"
               [src]="producto.imagenUrl"
               width="50">
        </td>

        <td>
          <button class="btn-editar"
                  (click)="onEdit(producto)">
            <i class="bx bx-edit"></i>
          </button>

          <button class="btn-eliminar"
                  (click)="onDelete(producto)">
            <i class="bx bx-trash"></i>
          </button>
        </td>

      </tr>
    </tbody>
  </table>
</div>
