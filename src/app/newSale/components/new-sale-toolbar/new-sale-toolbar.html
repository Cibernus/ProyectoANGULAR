<div class="primer-apartado">
  <div class="busqueda">
    <i class="bx bx-search icono-busqueda"></i>
    <input 
      type="search" 
      placeholder="Buscar..." 
      aria-label="Escanear Productos" 
      id="search"
      (input)="onSearch($event)">
  </div>
  <div>
    <button class="escanear" (click)="onScan()">
      <i class="bx bx-qr"></i>Escanear
    </button>
  </div>
</div>
