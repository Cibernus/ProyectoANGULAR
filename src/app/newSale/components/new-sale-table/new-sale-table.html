<div class="tablas-informacion">
  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Operaciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items">
        <td>{{ item.nombre }}</td>
        <td>
          <div class="cantidad-ctrl">
            <button class="menor-btn" (click)="decreaseQuantity(item)">−</button>
            <span class="cantidad-num">{{ item.cantidad }}</span>
            <button class="mas-btn" (click)="increaseQuantity(item)">+</button>
          </div>
        </td>
        <td>${{ item.precio.toFixed(2) }}</td>
        <td>
          <div class="btn-contenedor">
            <button class="btn-eliminar" (click)="removeItem(item)">
              <i class="bx bx-trash"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
